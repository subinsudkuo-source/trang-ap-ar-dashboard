<style>
:root {
  color-scheme: light;
  --bg: #f6f7f4;
  --surface: #ffffff;
  --surface-soft: #eef4f2;
  --ink: #172033;
  --muted: #657084;
  --line: #d8dee8;
  --line-strong: #bdc8d7;
  --teal: #18796f;
  --teal-soft: #dcefeb;
  --blue: #315fa8;
  --amber: #b7791f;
  --amber-soft: #fff1d6;
  --red: #c7483c;
  --red-soft: #ffe2df;
  --green: #197a46;
  --green-soft: #def2e7;
  --shadow: 0 10px 30px rgba(23, 32, 51, 0.08);
  font-family: Arial, "Noto Sans Thai", "Tahoma", sans-serif;
  font-size: 16px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-width: 320px;
  background: var(--bg);
  color: var(--ink);
}

button,
input,
select {
  font: inherit;
}

button,
select,
input {
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  background: var(--surface);
  color: var(--ink);
}

button {
  min-height: 36px;
  padding: 0 12px;
  cursor: pointer;
}

button:hover {
  border-color: var(--teal);
}

button:focus-visible,
input:focus-visible,
select:focus-visible {
  outline: 3px solid rgba(24, 121, 111, 0.18);
  outline-offset: 2px;
}

input,
select {
  min-height: 36px;
  padding: 6px 10px;
}

.app-shell {
  min-height: 100vh;
}

.topbar {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: end;
  padding: 24px 28px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
}

.brand-block {
  max-width: 880px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--teal);
  font-size: 0.82rem;
  font-weight: 700;
}

h1,
h2 {
  margin: 0;
  letter-spacing: 0;
}

h1 {
  font-size: 1.45rem;
  line-height: 1.28;
}

h2 {
  font-size: 1.02rem;
  line-height: 1.3;
}

.source-line {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 0.88rem;
}

.toolbar,
.filters,
.actions,
.entry-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: end;
}

label {
  display: grid;
  gap: 4px;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 700;
}

label input,
label select {
  color: var(--ink);
  font-size: 0.92rem;
  font-weight: 400;
}

.tabs {
  position: sticky;
  top: 0;
  z-index: 5;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 10px 28px;
  background: rgba(246, 247, 244, 0.94);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(8px);
}

.tab,
.segment {
  white-space: nowrap;
  border-color: transparent;
  background: transparent;
}

.tab.is-active,
.segment.is-active {
  color: var(--teal);
  background: var(--teal-soft);
  border-color: rgba(24, 121, 111, 0.28);
  font-weight: 700;
}

main {
  padding: 22px 28px 36px;
}

.view {
  display: none;
}

.view.is-active {
  display: grid;
  gap: 18px;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(190px, 1fr));
  gap: 12px;
}

.stat-card,
.panel {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.stat-card {
  min-height: 112px;
  padding: 14px;
  display: grid;
  align-content: space-between;
  gap: 12px;
}

.stat-label {
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 700;
}

.stat-value {
  font-size: 1.4rem;
  font-weight: 800;
  line-height: 1.15;
}

.stat-note {
  color: var(--muted);
  font-size: 0.78rem;
}

.stat-card.good {
  border-top: 4px solid var(--green);
}

.stat-card.warn {
  border-top: 4px solid var(--amber);
}

.stat-card.info {
  border-top: 4px solid var(--blue);
}

.stat-card.danger {
  border-top: 4px solid var(--red);
}

.two-column {
  display: grid;
  grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.75fr);
  gap: 18px;
}

.panel {
  min-width: 0;
  padding: 16px;
}

.panel-heading {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
  margin-bottom: 12px;
}

.badge {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding: 3px 9px;
  border-radius: 999px;
  background: var(--surface-soft);
  color: var(--teal);
  font-size: 0.78rem;
  font-weight: 800;
  white-space: nowrap;
}

.badge-warn {
  color: var(--amber);
  background: var(--amber-soft);
}

.badge-danger {
  color: var(--red);
  background: var(--red-soft);
}

.chart-box {
  width: 100%;
  min-height: 300px;
  overflow-x: auto;
}

.chart-tall {
  min-height: 430px;
}

.bar-label {
  fill: var(--ink);
  font-size: 13px;
  font-weight: 700;
}

.bar-value {
  fill: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

.axis-line {
  stroke: var(--line-strong);
  stroke-width: 1;
}

.alert-list {
  display: grid;
  gap: 8px;
}

.alert-item {
  display: grid;
  gap: 4px;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
}

.alert-item:last-child {
  border-bottom: 0;
}

.alert-title {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  font-weight: 800;
}

.alert-meta {
  color: var(--muted);
  font-size: 0.82rem;
}

.table-wrap {
  width: 100%;
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 8px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 780px;
  background: var(--surface);
}

th,
td {
  padding: 9px 10px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: middle;
  white-space: nowrap;
}

th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: #eef2f6;
  color: #344054;
  font-size: 0.78rem;
  font-weight: 800;
}

td {
  font-size: 0.88rem;
}

td.num,
th.num {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

tbody tr:hover {
  background: #f8fbfa;
}

.status {
  display: inline-flex;
  justify-content: center;
  min-width: 76px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 0.76rem;
  font-weight: 800;
}

.status.ok {
  color: var(--green);
  background: var(--green-soft);
}

.status.review {
  color: var(--amber);
  background: var(--amber-soft);
}

.status.danger {
  color: var(--red);
  background: var(--red-soft);
}

.segmented {
  display: inline-flex;
  gap: 4px;
  padding: 3px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #f4f6f8;
}

.entry-bar,
.backend-bar {
  margin-bottom: 12px;
  padding: 12px;
  background: #f7faf9;
  border: 1px solid var(--line);
  border-radius: 8px;
}

.entry-bar output,
.backend-bar output {
  min-height: 36px;
  padding: 8px 10px;
  border-radius: 6px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--line);
  font-size: 0.88rem;
}

.trial-upload-bar input[type="file"] {
  max-width: 280px;
}

.trial-upload-bar input[type="text"] {
  min-width: 250px;
}

.trial-preview-wrap {
  max-height: 280px;
}

.backend-bar {
  display: grid;
  grid-template-columns: minmax(280px, 1fr) auto minmax(180px, auto);
  gap: 10px;
  align-items: end;
}

.monthly-summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 12px;
}

.summary-pill {
  min-height: 64px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
}

.summary-pill span {
  display: block;
  color: var(--muted);
  font-size: 0.76rem;
  font-weight: 700;
}

.summary-pill strong {
  display: block;
  margin-top: 4px;
  font-size: 1.05rem;
  line-height: 1.15;
}

#monthlyTable input,
#monthlyTable select {
  width: 100%;
  min-width: 120px;
}

#monthlyTable input[type="number"] {
  text-align: right;
}

.matrix-wrap table {
  min-width: 1040px;
}

.matrix-cell {
  min-width: 96px;
  text-align: right;
  font-size: 0.8rem;
  font-variant-numeric: tabular-nums;
}

.matrix-zero {
  color: #9aa5b5;
  background: #f5f7f8;
}

.icon-button,
.ghost {
  background: var(--surface);
}

.danger {
  color: var(--red);
  border-color: #e7b3ad;
}

.empty-state {
  display: grid;
  min-height: 180px;
  place-items: center;
  color: var(--muted);
  border: 1px dashed var(--line-strong);
  border-radius: 8px;
  background: var(--surface);
}

.error-state {
  padding: 18px;
  border: 1px solid #e7b3ad;
  border-radius: 8px;
  color: var(--red);
  background: var(--red-soft);
}

@media (max-width: 1080px) {
  .topbar {
    align-items: start;
    flex-direction: column;
  }

  .stat-grid {
    grid-template-columns: repeat(2, minmax(190px, 1fr));
  }

  .two-column {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 720px) {
  .topbar,
  main {
    padding-left: 14px;
    padding-right: 14px;
  }

  .tabs {
    padding-left: 14px;
    padding-right: 14px;
  }

  h1 {
    font-size: 1.18rem;
  }

  .stat-grid,
  .monthly-summary {
    grid-template-columns: 1fr;
  }

  .panel-heading {
    align-items: start;
    flex-direction: column;
  }

  .toolbar,
  .filters,
  .actions,
  .entry-bar,
  .backend-bar {
    width: 100%;
  }

  label,
  label input,
  label select,
  .actions button,
  .backend-bar button,
  .backend-bar output {
    width: 100%;
  }

  .backend-bar {
    grid-template-columns: 1fr;
  }
}

</style>
